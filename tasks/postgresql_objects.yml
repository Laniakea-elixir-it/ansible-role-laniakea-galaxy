---

- name: Include postgresql role
  include_role:
    name: ansible-postgresql
  vars:
    postgresql_version: "{{ laniakea_postgresql_version }}"
    postgresql_objects_users:
      - name: galaxy
    postgresql_objects_databases:
      - name: galaxy
        owner: galaxy
    postgresql_backup_dir: /data/backups
    postgresql_backup_local_dir: "{{ '~postgres' | expanduser }}/backups"

- name: Include postgresql objects role
  include_role:
    name: ansible-postgresql-objects
    apply:
      become: true
      become_user: postgres
  vars:
    postgresql_backup_dir: /data/backups
    postgresql_backup_local_dir: "{{ '~postgres' | expanduser }}/backups"
    postgresql_objects_users: "{{ galaxy_postgresql_objects_users }}"
    postgresql_objects_databases: "{{ galaxy_postgresql_objects_databases }}"

  # Fix Galaxy PostgreSQL public schema permissions
  - name: Grant schema privileges to Galaxy DB user
    community.postgresql.postgresql_privs:
      db: "{{ item }}"
      privs: CREATE,USAGE
      type: schema
      objs: public
      roles: "{{ galaxy_postgresql_objects_users | map(attribute='name') | join(',') }}"
      login_user: postgres
    become: true
    become_user: postgres
    loop: "{{ galaxy_postgresql_objects_databases | map(attribute='name') | list }}"
